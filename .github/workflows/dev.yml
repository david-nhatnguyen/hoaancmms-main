name: CI/CD Development

on:
  push:
    branches: ["development"]
  pull_request:
    branches: ["development", "main"]
  workflow_dispatch: # Cho phép chạy thủ công từ giao diện GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- JOB 1: QUALITY CHECK (Lint & Test) ---
  quality-check:
    name: Quality Check (Lint & Test)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hoaancmms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/hoaancmms
      JWT_SECRET: super-secret-jwt-key
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Để Turbo có thể so sánh thay đổi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # Cache cho Turbo Repo để không chạy lại task đã pass
      - name: Cache Turbo
        uses: actions/cache@v3
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Linting
        run: yarn lint

      - name: Unit Testing (with Coverage)
        run: npx turbo run test -- --coverage

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps

      - name: E2E Testing
        run: yarn test:e2e
        env:
          CI: true