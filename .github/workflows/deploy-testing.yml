name: Deploy Testing Server
on:
  push:
    branches:
      - main

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        # Set these github secrets in the repository settings
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cmms-api:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # Note: Add VITE_API_URL or any other testing env variables here
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cmms-web:latest

  deploy-to-testing-server:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Trigger remote deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to the compose directory on the server
            cd /opt/deployments/clients/hoaancmms-main
            
            # Pull new images
            docker-compose pull
            
            # Restart containers non-disruptively
            docker-compose up -d --remove-orphans
