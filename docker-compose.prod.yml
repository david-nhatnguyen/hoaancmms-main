version: '3.8'

# This file is used specifically for PRODUCTION/TESTING server deployments
# It pulls pre-built images from Docker Hub instead of building from source
# For local development, use docker-compose.yml

services:
  postgres:
    image: postgres:15-alpine
    container_name: cmms-postgres
    restart: always # Ensure it reboots crash/server restart
    environment:
      POSTGRES_DB: ${DB_NAME:-cmms}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-cmms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: cmms-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    image: ${DOCKERHUB_USERNAME}/cmms-api:latest
    container_name: cmms-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-cmms}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "3000:3000"
    volumes:
      - upload_data:/app/uploads
    networks:
      - app-network

  web:
    image: ${DOCKERHUB_USERNAME}/cmms-web:latest
    container_name: cmms-web
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  upload_data: # Persist uploaded user files across container updates

networks:
  app-network:
    driver: bridge
